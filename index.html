<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pan Francés | Gestión de Producción</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Tipografías profesionales -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #D2691E;
            --color-primary-dark: #B85C1A;
            --color-rustic: #8B4513;
            --color-rustic-light: #A0522D;
            --bg-cream: #FCF9F5;
            --bg-card: #FFFFFF;
            --text-dark: #2C2418;
            --text-muted: #8B7355;
            --border-stone: #EEDDCB;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-cream);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .product-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-stone);
        }

        /* Header */
        .product-header {
            background: linear-gradient(135deg, var(--color-rustic) 0%, var(--color-rustic-light) 100%);
            padding: 18px 16px;
            text-align: center;
            position: relative;
            border-bottom: 2px solid var(--color-primary);
        }

        .product-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--bg-cream);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .product-header p {
            color: rgba(252, 249, 245, 0.8);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Botón de retorno */
        .back-button {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(252, 249, 245, 0.2);
            backdrop-filter: blur(6px);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid rgba(252, 249, 245, 0.3);
        }

        .back-button i {
            color: var(--bg-cream);
            font-size: 0.85rem;
        }

        .back-button:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* Panel de resumen */
        .summary-panel {
            padding: 16px;
            background: var(--bg-cream);
            border-bottom: 1px solid var(--border-stone);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 10px 8px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-stone);
        }

        .stat-card.full-width {
            grid-column: 1 / -1;
            margin-bottom: 0;
            padding: 8px;
        }

        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
            font-family: 'Playfair Display', serif;
        }

        .stat-value.cost {
            color: var(--color-primary);
        }

        /* Control de cantidad */
        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 2px;
        }

        .qty-input {
            width: 65px;
            border: 1.5px solid var(--border-stone);
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
            padding: 6px 0;
            outline: none;
            background: var(--bg-card);
            font-family: 'Inter', sans-serif;
        }

        .qty-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(210, 105, 30, 0.1);
        }

        .unit-text {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.75rem;
        }

        /* Lista de ingredientes */
        .ingredients-list {
            padding: 6px 16px 16px;
            background: var(--bg-card);
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-rustic);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1.5px solid var(--border-stone);
        }

        .section-title i {
            margin-right: 6px;
            font-size: 0.7rem;
            color: var(--color-primary);
        }

        .ingredient-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-stone);
        }

        .ingredient-item:last-child {
            border-bottom: none;
        }

        .ingredient-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        .ingredient-percent {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: normal;
            margin-left: 4px;
        }

        .ingredient-details {
            text-align: right;
        }

        .ingredient-quantity {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-dark);
        }

        .ingredient-price {
            font-size: 0.65rem;
            color: var(--color-primary);
            font-weight: 600;
            margin-top: 1px;
        }

        /* Botón de acción */
        .action-button {
            margin: 6px 16px 20px;
        }

        .btn-copy {
            width: 100%;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(210, 105, 30, 0.25);
        }

        .btn-copy:active {
            transform: scale(0.98);
        }

        .copy-message {
            text-align: center;
            font-size: 0.7rem;
            color: var(--color-primary);
            margin-top: 8px;
            display: none;
            font-weight: 500;
        }

        /* Footer */
        .footer-brand {
            text-align: center;
            padding: 12px 16px;
            background: var(--bg-cream);
            border-top: 1px solid var(--border-stone);
        }

        .footer-brand span {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        @media (max-width: 380px) {
            body {
                padding: 12px;
            }
            .product-header h1 {
                font-size: 1.3rem;
            }
            .stat-value {
                font-size: 1rem;
            }
            .ingredient-name {
                font-size: 0.75rem;
            }
            .ingredient-quantity {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="product-card">
    <div class="product-header">
        <a href="https://loep1039.github.io/Menu_Panaderia/" class="back-button">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>PAN FRANCÉS</h1>
        <p>Fernando Araujo</p>
    </div>

    <div class="summary-panel">
        <div class="stats-grid">
            <div class="stat-card full-width">
                <div class="stat-label">Cantidad</div>
                <div class="quantity-control">
                    <input type="number" id="inputPanes" class="qty-input" value="1" min="1" step="1">
                    <span class="unit-text">unidades</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Costo insumos</div>
                <div class="stat-value cost" id="resCosto">$ 0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Masa total</div>
                <div class="stat-value" id="resMasa">0 g</div>
            </div>
        </div>
    </div>

    <div class="ingredients-list">
        <div class="section-title">
            <i class="fas fa-flour"></i> Ingredientes
        </div>
        <div id="listaIngredientes"></div>
    </div>

    <div class="action-button">
        <button class="btn-copy" onclick="copiarAlPortapapeles()">
            <i class="fas fa-copy"></i> Copiar lista
        </button>
        <div id="copyMessage" class="copy-message">
            <i class="fas fa-check-circle"></i> ¡Lista copiada!
        </div>
    </div>

    <div class="footer-brand">
        <span>Gestión profesional de panadería</span>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://api.sheetbest.com/sheets/5f938b72-3297-465c-94bd-2532c8288d68";

    const RECETA = {
        nombre: "Pan Francés",
        harinaPorUnidad: 49.0,
        items: [
            { nombre: "Harina", pct: 100.0, precioKg: 0 },
            { nombre: "Agua", pct: 54.5, precioKg: 0 },
            { nombre: "Levadura", pct: 1.7, precioKg: 0 },
            { nombre: "Sal", pct: 2.0, precioKg: 0 },
            { nombre: "Azúcar", pct: 8.0, precioKg: 0 },
            { nombre: "Margarina", pct: 8.0, precioKg: 0 },
            { nombre: "Vainilla", pct: 0.8, precioKg: 0 }
        ]
    };

    async function sincronizarPrecios() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            
            RECETA.items.forEach(ing => {
                const encontrado = data.find(p => p.nombre.toLowerCase().trim() === ing.nombre.toLowerCase());
                if (encontrado) {
                    ing.precioKg = encontrado.precioKg;
                }
            });
            calcular(); 
        } catch (error) {
            console.error("Error al cargar precios:", error);
            calcular();
        }
    }

    function calcular() {
        const panes = parseFloat(document.getElementById('inputPanes').value) || 0;
        const contenedor = document.getElementById('listaIngredientes');
        contenedor.innerHTML = '';

        let masaTotal = 0;
        let costoTotal = 0;

        RECETA.items.forEach(ing => {
            const gramos = (RECETA.harinaPorUnidad * panes) * (ing.pct / 100);
            const costo = (gramos / 1000) * ing.precioKg;

            masaTotal += gramos;
            costoTotal += costo;

            contenedor.innerHTML += `
                <div class="ingredient-item">
                    <div>
                        <span class="ingredient-name">${ing.nombre}</span>
                        <span class="ingredient-percent">(${ing.pct}%)</span>
                    </div>
                    <div class="ingredient-details">
                        <div class="ingredient-quantity">${gramos.toFixed(1)} g</div>
                        <div class="ingredient-price">$ ${costo.toFixed(3)}</div>
                    </div>
                </div>
            `;
        });

        document.getElementById('resMasa').innerText = `${masaTotal.toFixed(0)} g`;
        document.getElementById('resCosto').innerText = `$ ${costoTotal.toFixed(2)}`;
    }

    function copiarAlPortapapeles() {
        const panes = document.getElementById('inputPanes').value;
        const masaTotalStr = document.getElementById('resMasa').innerText;
        const costoTotalStr = document.getElementById('resCosto').innerText;

        let textoCopiar = `${RECETA.nombre.toUpperCase()}\n`;
        textoCopiar += `━━━━━━━━━━━━━━━━\n`;
        textoCopiar += `Cantidad: ${panes} unidad(es)\n`;
        textoCopiar += `Costo insumos: ${costoTotalStr}\n`;
        textoCopiar += `Masa total: ${masaTotalStr}\n`;
        textoCopiar += `━━━━━━━━━━━━━━━━\n`;
        textoCopiar += `LISTA DE INSUMOS:\n\n`;

        RECETA.items.forEach(ing => {
            const gramos = (RECETA.harinaPorUnidad * panes) * (ing.pct / 100);
            textoCopiar += `${ing.nombre}: ${gramos.toFixed(1)} g\n`;
        });

        textoCopiar += `\n━━━━━━━━━━━━━━━━\n`;
        textoCopiar += `Fernando Araujo`;

        navigator.clipboard.writeText(textoCopiar).then(() => {
            const messageEl = document.getElementById('copyMessage');
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 2000);
        });
    }

    document.getElementById('inputPanes').addEventListener('input', calcular);
    window.onload = sincronizarPrecios;
</script>

</body>
</html>
